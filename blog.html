<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aeka's Coffee</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="css/cart.css" />
    <style>
        .sovit-hero {
            padding: 10rem 5% 5rem;
            padding-bottom: 3rem;
            min-height: 80vh;
            background-color: var(--bg-primary, #f7f7f5);
            color: var(--text-primary, #111);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .hero-title {
            text-align: center;
            font-size: clamp(2.5rem, 5vw, 5.5rem);
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            line-height: 1.1;
            letter-spacing: -1px;

            z-index: 2;
            position: relative;

        }

        .marker-text {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(3rem, 6vw, 6.5rem);
            font-weight: 400;

            letter-spacing: 2px;
            margin-left: 0.5rem;
        }

        .color-orange {
            color: #d16b47;
        }

        .relative-box {
            position: relative;
            display: inline-block;
        }

        .hero-subtext {
            text-align: center;
            font-size: clamp(0.9rem, 1.8vw, 1.25rem);
            color: var(--text-secondary, #666);
            max-width: 500px;
            margin: 2rem;
            font-weight: 400;
            line-height: 1.6;
            z-index: 2;
            position: relative;
        }

        /* Hide flame when title wraps on mobile/small screens */
        @media (max-width: 451px) {
            .fire-container {
                display: none;
            }
        }

        .hero-character {
            width: 50vw;
            height: 30vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .hero-character img {
            width: 100%;
            position: relative;
            left: 25vw;
            object-fit: cover;
            transition: filter 0.3s ease, left 0.3s ease, width 0.3s ease;
        }

        body.dark-theme .hero-character img {
            filter: invert(1);
        }

        @media (max-width: 1000px) {
            .hero-character {
                width: 100%;
                height: auto;
            }

            .hero-character img {
                left: 0;
                width: 120%;
                object-fit: contain;
            }
        }

        .svg-oval {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110%;
            height: 130%;
            z-index: -1;
            pointer-events: none;
            overflow: visible;
        }

        .svg-lines {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 25px;
            z-index: -1;
            pointer-events: none;
            overflow: visible;
        }

        .pixel-font {
            font-family: 'Pixelify Sans', sans-serif !important;
            letter-spacing: 2px;
            font-size: 1.1em;
        }

        .flame-l {
            position: relative;
            display: inline-block;
        }

        .fire-container {
            position: absolute;
            bottom: 60%;
            left: 50%;
            transform: translateX(-50%) scale(0.35);
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 10;
        }

        .fire {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .flame {
            position: absolute;
            bottom: 0;
            left: 0;
            opacity: .9;
            width: 100%;
            height: 100%;
            border-bottom-right-radius: 70%;
            border-bottom-left-radius: 70%;
            border-top-left-radius: 70%;
            transform: rotate(-45deg) skew(-10deg, -10deg);
            background-color: rgb(255, 34, 0);
            background-image: linear-gradient(to top right, rgba(255, 34, 0, 0.9), rgba(255, 106, 0, 0.7));
            z-index: 1;
            animation-iteration-count: infinite;
            animation-fill-mode: forwards;
            animation-name: burn-left;
            animation-duration: 300ms;
        }

        .flame:nth-of-type(2n) {
            animation-name: burn-right;
            animation-duration: 400ms;
        }

        .flame:nth-of-type(2) {
            height: 80%;
            width: 80%;
            left: 10%;
            background-color: rgb(255, 106, 0);
            background-image: linear-gradient(to top right, rgba(255, 106, 0, 0.9), rgba(255, 200, 0, 0.9));
            z-index: 2;
        }

        .flame:nth-of-type(3) {
            height: 50%;
            width: 50%;
            left: 25%;
            background-image: linear-gradient(to top right, rgb(255, 200, 0), white);
            z-index: 3;
        }

        .flame:nth-of-type(4) {
            height: 30%;
            width: 30%;
            left: 35%;
            background-color: white;
            background-image: linear-gradient(to top right, rgba(255, 255, 255, 0.7), rgba(0, 55, 255, 0.1));
            opacity: 1;
            z-index: 4;
        }

        .spark {
            position: absolute;
            bottom: 46%;
            left: 15%;
            width: 3px;
            height: 3px;
            background-color: rgba(255, 106, 0, 0.6);
            animation-name: fly-up-burnout-1;
            animation-duration: 6s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-delay: .4s;
        }

        .spark:nth-of-type(2n) {
            animation-name: fly-up-burnout-2;
            animation-duration: 8.4s;
            animation-delay: 1s;
        }

        .spark:nth-of-type(3n) {
            animation-delay: 1.9s;
            animation-duration: 8s;
            left: 55%;
        }

        .spark:nth-of-type(4n) {
            animation-delay: 2.6s;
            animation-duration: 7s;
            left: 88%;
        }

        .spark:nth-of-type(5n) {
            animation-delay: 1.4s;
            animation-duration: 7s;
            left: 22%;
        }

        @keyframes burn-left {

            0%,
            100% {
                transform: rotate(-45deg) skew(-10deg, -10deg) scale(1);
            }

            30%,
            60% {
                transform: rotate(-44deg) skew(-12deg, -12deg) scale(1.01);
            }
        }

        @keyframes burn-right {

            0%,
            100% {
                transform: rotate(-45deg) skew(-10deg, -10deg) scale(1);
            }

            30%,
            60% {
                transform: rotate(-46deg) skew(-6deg, -6deg) scale(1.01);
            }
        }

        @keyframes fly-up-burnout-1 {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }

            33% {
                transform: translate(12px, -70px);
            }

            66% {
                transform: translate(0, -140px);
                opacity: .6;
            }

            100% {
                transform: translate(6px, -200px);
                opacity: 0;
            }
        }

        @keyframes fly-up-burnout-2 {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }

            50% {
                transform: translate(-10px, -80px);
            }

            80% {
                transform: translate(-4px, -140px);
                opacity: .6;
            }

            100% {
                transform: translate(-6px, -160px);
                opacity: 0;
            }
        }

        /* Fix profile icon hover color in light mode */
        .nav-btn:hover svg {
            color: var(--text-primary) !important;
            stroke: var(--text-primary) !important;
        }

        body.dark-theme .nav-btn:hover svg {
            color: var(--text-primary) !important;
            stroke: var(--text-primary) !important;
        }
    </style>

</head>
